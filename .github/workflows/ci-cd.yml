name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  release:
    types: [created]

env:
  DOCKER_IMAGE: mariopeters/shell-menu-runner

jobs:
  # ==============================================================================
  #  LINT & VALIDATE
  # ==============================================================================
  lint:
    name: Lint & Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install ShellCheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Run ShellCheck
        run: |
          shellcheck run.sh build.sh install.sh || true

      - name: Validate task files
        run: |
          for tasks_file in docs/examples/*.tasks; do
            echo "Validating $tasks_file"
            ./run.sh --config "$tasks_file" --validate || true
          done

  # ==============================================================================
  #  TEST
  # ==============================================================================
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Cache build artifacts
        uses: actions/cache@v4
        with:
          path: |
            dist/
            .build-cache/
            .build-logs/
          key: ${{ runner.os }}-build-${{ hashFiles('run.sh', 'build-platform/**/*.sh') }}
          restore-keys: |
            ${{ runner.os }}-build-

      - name: Make scripts executable
        run: |
          chmod +x build-platform/builder.sh
          chmod +x build-platform/tests/test-runner.sh
          chmod +x build.sh run.sh

      - name: Run test suite
        run: |
          bash build-platform/tests/test-runner.sh

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: .build-logs/

  # ==============================================================================
  #  BUILD
  # ==============================================================================
  build:
    name: Build All Targets
    runs-on: ubuntu-latest
    needs: test

    strategy:
      matrix:
        target: [dev, prod, minimal]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Cache build artifacts
        uses: actions/cache@v4
        with:
          path: |
            dist/
            .build-cache/
          key: ${{ runner.os }}-build-${{ matrix.target }}-${{ hashFiles('run.sh', 'build-platform/**/*.sh') }}
          restore-keys: |
            ${{ runner.os }}-build-${{ matrix.target }}-
            ${{ runner.os }}-build-

      - name: Make builder executable
        run: chmod +x build-platform/builder.sh

      - name: Build ${{ matrix.target }}
        run: |
          bash build-platform/builder.sh build ${{ matrix.target }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.target }}
          path: dist/run-${{ matrix.target }}.sh

  # ==============================================================================
  #  PACKAGE
  # ==============================================================================
  package:
    name: Create Packages
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Cache build artifacts
        uses: actions/cache@v4
        with:
          path: |
            dist/
            .build-cache/
          key: ${{ runner.os }}-build-${{ hashFiles('run.sh', 'build-platform/**/*.sh') }}
          restore-keys: |
            ${{ runner.os }}-build-

      - name: Make builder executable
        run: chmod +x build-platform/builder.sh

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: build-*
          path: dist/

      - name: Build production version
        run: |
          bash build-platform/builder.sh build prod

      - name: Create tarball
        run: |
          bash build-platform/builder.sh package tarball

      - name: Create .deb package
        run: |
          bash build-platform/builder.sh package deb

      - name: Generate checksums
        run: |
          cd dist
          sha256sum *.tar.gz *.deb > SHA256SUMS || true
          cat SHA256SUMS

      - name: Upload packages
        uses: actions/upload-artifact@v4
        with:
          name: packages
          path: |
            dist/*.tar.gz
            dist/*.deb
            dist/SHA256SUMS

  # ==============================================================================
  #  DOCKER BUILD
  # ==============================================================================
  docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: github.event_name == 'release'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract version
        id: version
        run: |
          VERSION=$(grep -m1 -o 'VERSION="[^"]*"' run.sh | cut -d'"' -f2)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Make builder executable
        run: chmod +x build-platform/builder.sh

      - name: Build production version
        run: bash build-platform/builder.sh build prod

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: build-platform/Dockerfile
          push: ${{ github.event_name == 'release' }}
          tags: |
            ${{ env.DOCKER_IMAGE }}:latest
            ${{ env.DOCKER_IMAGE }}:${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ==============================================================================
  #  RELEASE
  # ==============================================================================
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    needs: [test, build, package, docker]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download packages
        uses: actions/download-artifact@v4
        with:
          name: packages
          path: dist/

      - name: Extract version
        id: version
        run: |
          VERSION=$(grep -m1 -o 'VERSION="[^"]*"' run.sh | cut -d'"' -f2)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Create Release Notes
        run: |
          cat > release-notes.md <<EOF
          # Shell Menu Runner v${{ steps.version.outputs.version }}

          ## Installation

          ### Quick Install (Linux/macOS)
          \`\`\`bash
          curl -fsSL https://github.com/MarioPeters/shell-menu-runner/releases/download/v${{ steps.version.outputs.version }}/install.sh | bash
          \`\`\`

          ### Manual Download
          - Download the tarball or .deb package below
          - Extract and run: \`./install.sh\`

          ### Docker
          \`\`\`bash
          docker pull ${{ env.DOCKER_IMAGE }}:${{ steps.version.outputs.version }}
          \`\`\`

          ## What's Changed

          See [CHANGELOG.md](https://github.com/MarioPeters/shell-menu-runner/blob/main/CHANGELOG.md)

          ## Checksums

          \`\`\`
          $(cat dist/SHA256SUMS)
          \`\`\`
          EOF

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v1
        with:
          files: |
            dist/*.tar.gz
            dist/*.deb
            dist/SHA256SUMS
          body_path: release-notes.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ==============================================================================
  #  SECURITY SCAN
  # ==============================================================================
  security:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "."
          format: "sarif"
          output: "trivy-results.sarif"

      - name: Upload Trivy results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: "trivy-results.sarif"

  # ==============================================================================
  #  CODE QUALITY
  # ==============================================================================
  quality:
    name: Code Quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check line endings
        run: |
          ! find . -name "*.sh" -exec file {} \; | grep CRLF

      - name: Check file permissions
        run: |
          test -x run.sh
          test -x build.sh
          test -x install.sh

      - name: Verify version consistency
        run: |
          VERSION=$(grep -m1 -o 'VERSION="[^"]*"' run.sh | cut -d'"' -f2)
          echo "Detected version: $VERSION"

          # Check README
          if ! grep -q "$VERSION" README.md; then
            echo "Warning: Version $VERSION not found in README.md"
          fi

      - name: Check documentation
        run: |
          test -f README.md
          test -f CHANGELOG.md
          test -f docs/QUICK_START.md
          test -f docs/ADVANCED_USAGE.md
